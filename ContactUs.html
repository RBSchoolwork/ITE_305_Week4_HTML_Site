<!DOCTYPE html>
<header>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <!-- not in use - see JQuery equivalent Below -->
    <script>
        window.addEventListener("DOMContentLoaded", () => {
            return; // comment out to use this block.

            const btn = document.getElementById("btnSubmit");
            if (!btn){
                alert("Submit Button not found!");
                return;
            }
            //alert("Button Found!");
            
            btn.addEventListener("click", () =>
            {
                const email = document.getElementById('txtEmail').value;
                const name = document.getElementById('txtName').value;
                const comment = document.getElementById('txtComments').value;
                alert("Name : " + name + "\nEmail : " + email + "\nComment: " + comment);
            });
        });
    </script>
    <!-- JQuery-ized script from above -->
    <script src="https://code.jquery.com/jquery-4.0.0.min.js"></script>
     <script>
        $(function () 
        {
            const $btn = $("#btnSubmit");
            if ($btn.length === 0) {
                alert("Submit Button not found!");
                return;
            }
            // alert("Button Found!");

            $btn.on("click", function () 
            {
                const email = $("#txtEmail").val();
                const name = $("#txtName").val();
                const comment = $("#txtComments").val();
            alert("Name : " + name + "\nEmail : " + email + "\nComment: " + comment);
            });
        });
     </script>
</header>
<body>
    <h1 class="text-center" style="margin: 20px 0px;">Suggest a Park</h1>
            
    <div class="ContactUs-photo text-center" style="margin:20px">
        <img src="./Images/NRG_A.JPG" alt="Suggest A Park Photo" 
        class="mx-auto d-block img-fluid rounded shadow w-50"
        style="max-height: 200px; object-fit: cover;"
         />
        <p class="small text-muted mb-0">
            New River Gorge National Park. 
            <br/>Photograph by Robert Brenckman, July 13, 2026.
        </p>
    </div>
    <div class="container my-4 w-75 ">
        <div class="">
            <p class="text-center">
                If you have a suggestion for a park that I should visit, please fill out the form below and submit it. 
                I will review your suggestion and if it is feasible, I will add it to my list of parks to visit.
            </p>
        </div>
        <div class="border rounded shadow-sm p-4 bg-light">
        <form class="ContactUs-form">
            <div class="mb-3">
                <label for="txtName" class="form-label">Name</label>
                <input type="text" id="txtName" class="form-control"/>
            </div>
            <div class="mb-3">
                <label for="txtEmail" class="form-label">Email Address</label>
                <input type="text" id="txtEmail" class="form-control"/>
            </div>
            <div class="mb-3">
                <label for="txtComments" class="form-label">Comments</label>
                <textarea id="txtComments" class="form-control"></textarea>
            </div>
            <button class="btn btn-primary" id="btnSubmit">Submit</button>
        </form>
    </div>
    </div>
</body>
