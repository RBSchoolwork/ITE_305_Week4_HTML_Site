<!DOCTYPE html>
<header>
    <!-- not in use - see JQuery equivalent Below -->
    <script>
        window.addEventListener("DOMContentLoaded", () => {
            return; // comment out to use this block.

            const btn = document.getElementById("btnSubmit");
            if (!btn){
                alert("Submit Button not found!");
                return;
            }
            //alert("Button Found!");
            
            btn.addEventListener("click", () =>
            {
                const email = document.getElementById('txtEmail').value;
                const name = document.getElementById('txtName').value;
                const comment = document.getElementById('txtComments').value;
                alert("Name : " + name + "\nEmail : " + email + "\nComment: " + comment);
            });
        });
    </script>
    <!-- JQuery-ized script from above -->
    <script src="https://code.jquery.com/jquery-4.0.0.min.js"></script>
     <script>
        $(function () 
        {
            const $btn = $("#btnSubmit");
            if ($btn.length === 0) {
                alert("Submit Button not found!");
                return;
            }
            // alert("Button Found!");

            $btn.on("click", function () 
            {
                const email = $("#txtEmail").val();
                const name = $("#txtName").val();
                const comment = $("#txtComments").val();
            alert("Name : " + name + "\nEmail : " + email + "\nComment: " + comment);
            });
        });
     </script>
</header>
<body>
    <div class="ContactUs-photo">
        <img src="" alt="Contact Us Photo" />
    </div>
    <div class="ContactUs">
        <form>
            <label>Name</label>
            <input type="text" id="txtName" class="input-text"/>
            <label>Email Address</label>
            <input type="text" id="txtEmail" class="input-text"/>
            <label>Comments</label>
            <input type="text" id="txtComments" class="input-text input-text-area"/>
        </form>
        <button id="btnSubmit">Submit</button>
    </div>
</body>
